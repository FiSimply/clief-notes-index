<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clief Notes — Resource Index</title>
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #22263a;
    --border: #2e3350;
    --accent: #6c63ff;
    --accent2: #00d4aa;
    --text: #e8e9f0;
    --muted: #8b8fa8;
    --tag-memory: #3d2b7a;
    --tag-memory-t: #b89ef7;
    --tag-icm: #1e4a6e;
    --tag-icm-t: #7ecfff;
    --tag-writing: #3a2e1e;
    --tag-writing-t: #f5c87a;
    --tag-design: #2a3a1e;
    --tag-design-t: #a8e06b;
    --tag-media: #3a1e2e;
    --tag-media-t: #f07ab8;
    --tag-workflow: #1e3a3a;
    --tag-workflow-t: #6beee0;
    --tag-external: #3a2a1e;
    --tag-external-t: #f0a86b;
    --card-hover: #1e2235;
    --star: #f0c040;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    line-height: 1.6;
    min-height: 100vh;
  }

  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 28px 40px 24px;
    position: sticky;
    top: 0;
    z-index: 100;
    backdrop-filter: blur(10px);
  }

  .header-top {
    display: flex;
    align-items: baseline;
    gap: 16px;
    margin-bottom: 16px;
    flex-wrap: wrap;
  }

  header h1 {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: -0.3px;
    color: var(--text);
  }

  header h1 span {
    color: var(--accent);
  }

  .subtitle {
    font-size: 13px;
    color: var(--muted);
  }

  .controls {
    display: flex;
    gap: 12px;
    align-items: center;
    flex-wrap: wrap;
  }

  #search {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-size: 14px;
    padding: 9px 14px;
    width: 280px;
    outline: none;
    transition: border-color 0.2s;
  }

  #search::placeholder { color: var(--muted); }
  #search:focus { border-color: var(--accent); }

  .filter-tabs {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }

  .filter-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 20px;
    color: var(--muted);
    cursor: pointer;
    font-size: 12px;
    padding: 5px 13px;
    transition: all 0.15s;
    white-space: nowrap;
  }

  .filter-btn:hover { border-color: var(--accent); color: var(--text); }

  .filter-btn.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
    font-weight: 600;
  }

  .stats-bar {
    font-size: 12px;
    color: var(--muted);
    margin-left: auto;
    white-space: nowrap;
  }

  main {
    padding: 32px 40px;
    max-width: 1400px;
    margin: 0 auto;
  }

  .section-header {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1.2px;
    text-transform: uppercase;
    color: var(--muted);
    margin: 32px 0 14px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .section-header .count {
    background: var(--surface2);
    border-radius: 10px;
    font-size: 11px;
    font-weight: 600;
    padding: 1px 8px;
    color: var(--muted);
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
    gap: 14px;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 18px 20px;
    transition: all 0.15s;
    display: flex;
    flex-direction: column;
    gap: 10px;
    cursor: default;
    position: relative;
  }

  .card:hover {
    background: var(--card-hover);
    border-color: var(--accent);
    transform: translateY(-1px);
    box-shadow: 0 4px 20px rgba(108,99,255,0.12);
  }

  .card-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 10px;
  }

  .card-title {
    font-size: 15px;
    font-weight: 700;
    color: var(--text);
    line-height: 1.3;
  }

  .star-btn {
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 18px;
    padding: 0;
    flex-shrink: 0;
    transition: color 0.15s, transform 0.1s;
    line-height: 1;
  }

  .star-btn:hover { transform: scale(1.2); }
  .star-btn.starred { color: var(--star); }

  .card-meta {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
  }

  .author {
    font-size: 12px;
    color: var(--accent2);
    font-weight: 600;
  }

  .tag {
    border-radius: 4px;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.5px;
    padding: 2px 7px;
    text-transform: uppercase;
  }

  .tag-memory    { background: var(--tag-memory);   color: var(--tag-memory-t); }
  .tag-icm       { background: var(--tag-icm);      color: var(--tag-icm-t); }
  .tag-writing   { background: var(--tag-writing);  color: var(--tag-writing-t); }
  .tag-design    { background: var(--tag-design);   color: var(--tag-design-t); }
  .tag-media     { background: var(--tag-media);    color: var(--tag-media-t); }
  .tag-workflow  { background: var(--tag-workflow); color: var(--tag-workflow-t); }
  .tag-external  { background: var(--tag-external); color: var(--tag-external-t); }

  .card-desc {
    font-size: 13px;
    color: #b0b3c8;
    line-height: 1.55;
  }

  .card-links {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 4px;
  }

  .link-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--muted);
    cursor: pointer;
    font-size: 12px;
    padding: 4px 10px;
    text-decoration: none;
    transition: all 0.15s;
    display: inline-flex;
    align-items: center;
    gap: 5px;
  }

  .link-btn:hover { border-color: var(--accent); color: var(--accent); }

  .link-btn.github { border-color: #30363d; color: #8b949e; }
  .link-btn.github:hover { border-color: #fff; color: #fff; }

  .link-btn.community { border-color: var(--tag-memory); color: var(--tag-memory-t); }
  .link-btn.community:hover { background: var(--tag-memory); }

  .link-btn.site { border-color: var(--tag-design); color: var(--tag-design-t); }
  .link-btn.site:hover { background: var(--tag-design); }

  .notes-section {
    margin-top: 4px;
  }

  .notes-toggle {
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 12px;
    padding: 0;
    text-align: left;
    transition: color 0.15s;
  }

  .notes-toggle:hover { color: var(--text); }

  .notes-input {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: inherit;
    font-size: 12px;
    margin-top: 6px;
    outline: none;
    padding: 8px 10px;
    resize: vertical;
    width: 100%;
    min-height: 64px;
    transition: border-color 0.2s;
    display: none;
  }

  .notes-input:focus { border-color: var(--accent); }
  .notes-input.visible { display: block; }

  .empty-state {
    text-align: center;
    padding: 60px 0;
    color: var(--muted);
    font-size: 15px;
  }

  .empty-state span { font-size: 40px; display: block; margin-bottom: 12px; }

  footer {
    border-top: 1px solid var(--border);
    color: var(--muted);
    font-size: 12px;
    margin-top: 40px;
    padding: 20px 40px;
    text-align: center;
  }

  .no-results-section { display: none; }
  .section-group { }
  .section-group.hidden { display: none; }

  @media (max-width: 700px) {
    header { padding: 20px; }
    main { padding: 20px; }
    .grid { grid-template-columns: 1fr; }
    #search { width: 100%; }
  }
</style>
</head>

    desc: "Claude Code alternative harness in Rust: 14 ms cold start, 27.8 MB idle RAM, self-modifying (agents can edit the harness's own source mid-session). Search 'jcode' in the community for the GitHub link.",
    links: [
      { label: "Search Community", url: "https://skool.com/cliefnotes", type: "community" },
    ]
  },
  {
    id: "understand-anything",
    name: "Understand Anything",
    author: "Egonex AI",
    cat: "external",
    desc: "Turn any codebase into an interactive knowledge graph. Maps dependencies, surfaces entry points, and lets you query the codebase conversationally.",
    links: [
      { label: "GitHub", url: "https://github.com/Egonex-AI/Understand-Anything", type: "github" },
    ]
  },
];

const CATEGORIES = [
  { id: "memory",   label: "Memory & Context",    tagClass: "tag-memory" },
  { id: "icm",      label: "ICM / Workspace",      tagClass: "tag-icm" },
  { id: "writing",  label: "Writing & Feedback",   tagClass: "tag-writing" },
  { id: "design",   label: "Design & UI",          tagClass: "tag-design" },
  { id: "media",    label: "Media & Content",      tagClass: "tag-media" },
  { id: "workflow", label: "Workflow & Utility",   tagClass: "tag-workflow" },
  { id: "external", label: "External Frameworks",  tagClass: "tag-external" },
];

const CAT_MAP = {};
CATEGORIES.forEach(c => CAT_MAP[c.id] = c);

// --- State ---
let activeFilter = "all";
let searchQuery = "";

function getStarred() {
  try { return JSON.parse(localStorage.getItem("cn_starred") || "{}"); } catch { return {}; }
}

function setStarred(obj) {
  localStorage.setItem("cn_starred", JSON.stringify(obj));
}

function getNote(id) {
  try { return localStorage.getItem("cn_note_" + id) || ""; } catch { return ""; }
}

function setNote(id, val) {
  localStorage.setItem("cn_note_" + id, val);
}

function toggleStar(id) {
  const s = getStarred();
  if (s[id]) delete s[id]; else s[id] = true;
  setStarred(s);
  const btn = document.querySelector(`[data-star="${id}"]`);
  if (btn) btn.classList.toggle("starred", !!s[id]);
  if (activeFilter === "starred") render();
}

function toggleNotes(id) {
  const input = document.getElementById("note_" + id);
  const btn = document.getElementById("ntoggle_" + id);
  if (!input) return;
  if (input.classList.contains("visible")) {
    input.classList.remove("visible");
    btn.textContent = "+ Add note";
  } else {
    input.classList.add("visible");
    input.focus();
    btn.textContent = "Hide note";
  }
}

function linkIcon(type) {
  if (type === "github") return "⌥";
  if (type === "community") return "◆";
  if (type === "site") return "↗";
  return "→";
}

function renderCard(tool) {
  const starred = getStarred();
  const note = getNote(tool.id);
  const cat = CAT_MAP[tool.cat] || {};
  const isStarred = !!starred[tool.id];

  const linksHTML = tool.links.map(l =>
    `<a class="link-btn ${l.type}" href="${l.url}" target="_blank" rel="noopener">${linkIcon(l.type)} ${l.label}</a>`
  ).join("");

  return `
    <div class="card" data-id="${tool.id}" data-cat="${tool.cat}">
      <div class="card-header">
        <div class="card-title">${tool.name}</div>
        <button class="star-btn ${isStarred ? 'starred' : ''}" data-star="${tool.id}" onclick="toggleStar('${tool.id}')" title="${isStarred ? 'Unstar' : 'Star'}">★</button>
      </div>
      <div class="card-meta">
        <span class="author">${tool.author}</span>
        <span class="tag ${cat.tagClass || ''}">${cat.label || tool.cat}</span>
      </div>
      <div class="card-desc">${tool.desc}</div>
      ${linksHTML ? `<div class="card-links">${linksHTML}</div>` : ""}
      <div class="notes-section">
        <button class="notes-toggle" id="ntoggle_${tool.id}" onclick="toggleNotes('${tool.id}')">${note ? "📝 View note" : "+ Add note"}</button>
        <textarea class="notes-input ${note ? 'visible' : ''}" id="note_${tool.id}" placeholder="Your private notes on this tool..."
          oninput="setNote('${tool.id}', this.value)">${note}</textarea>
      </div>
    </div>
  `;
}

function getFilteredTools() {
  const starred = getStarred();
  const q = searchQuery.toLowerCase();
  return TOOLS.filter(t => {
    if (activeFilter === "starred" && !starred[t.id]) return false;
    if (activeFilter !== "all" && activeFilter !== "starred" && t.cat !== activeFilter) return false;
    if (!q) return true;
    return (
      t.name.toLowerCase().includes(q) ||
      t.author.toLowerCase().includes(q) ||
      t.desc.toLowerCase().includes(q) ||
      t.cat.toLowerCase().includes(q)
    );
  });
}

function render() {
  const main = document.getElementById("main");
  const filtered = getFilteredTools();

  if (filtered.length === 0) {
    main.innerHTML = `<div class="empty-state"><span>🔍</span>No tools match "${searchQuery || activeFilter}"</div>`;
    document.getElementById("stats").textContent = "0 results";
    return;
  }

  document.getElementById("stats").textContent = `${filtered.length} of ${TOOLS.length} tools`;

  if (activeFilter !== "all" && activeFilter !== "starred") {
    main.innerHTML = `<div class="grid">${filtered.map(renderCard).join("")}</div>`;
    return;
  }

  // Group by category
  let html = "";
  const starred = getStarred();

  if (activeFilter === "starred") {
    html = `<div class="grid">${filtered.map(renderCard).join("")}</div>`;
  } else {
    CATEGORIES.forEach(cat => {
      const catTools = filtered.filter(t => t.cat === cat.id);
      if (!catTools.length) return;
      html += `
        <div class="section-group">
          <div class="section-header">
            ${cat.label}
            <span class="count">${catTools.length}</span>
          </div>
          <div class="grid">${catTools.map(renderCard).join("")}</div>
        </div>
      `;
    });
  }

  main.innerHTML = html;
}

// Search
document.getElementById("search").addEventListener("input", function() {
  searchQuery = this.value.trim();
  if (searchQuery) activeFilter = "all";
  render();
});

// Filter buttons
document.querySelectorAll(".filter-btn").forEach(btn => {
  btn.addEventListener("click", function() {
    activeFilter = this.dataset.cat;
    document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
    this.classList.add("active");
    if (activeFilter !== "all") {
      document.getElementById("search").value = "";
      searchQuery = "";
    }
    render();
  });
});

render();
</script>
</body>
</html>
